<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taller 3</title>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section>
      <div>
        <label for="pokemons" id="title">ELige tu Pokemón</label>
        <select id="pokemons">
          <option value="">Select a Pokemon</option>
        </select>
      </div>

      <div id="pokemon-info">
        <h1 id="pokemon-name"></h1>

        <div class="pokemon-image-and-types" id="pokemon-image-and-types">
          <div class="pokemon-image-wrap" id="pokemon-image-wrap">
            <img id="pokemon-image" />
          </div>

          <div id="pokemon-types-wrap">
            <span id="pokemon-types"></span>
          </div>
        </div>

        <ul id="pokemon-stats"></ul>
        <span id="pokemon-ability"></span>
      </div>
    </section>
  </body>
</html>
